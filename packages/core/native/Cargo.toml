[package]
name = "labby-core"
version = "0.1.0"
edition = "2021"
description = "Dynamic metric space embedding with HNSW ANN and incremental 2D projection"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = []
node   = ["dep:napi", "dep:napi-derive"]
wasm   = ["dep:wasm-bindgen", "dep:js-sys", "dep:console_error_panic_hook"]

[dependencies]
ndarray = "0.15"
nalgebra = "0.32"
rand    = { version = "0.8", features = ["small_rng"] }
serde   = { version = "1",   features = ["derive"] }

# Optional FFI targets
napi         = { version = "2", features = ["napi8"], optional = true }
napi-derive  = { version = "2",                       optional = true }
wasm-bindgen = { version = "0.2",                     optional = true }
js-sys       = { version = "0.3",                     optional = true }
console_error_panic_hook = { version = "0.1", optional = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.2", features = ["js"] }

[build-dependencies]
napi-build = { version = "2" }

[profile.release]
opt-level      = 3    # Enables auto-vectorization to AVX2/NEON in l2_dist_sq
lto            = true
codegen-units  = 1