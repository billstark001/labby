  zh-CN: 仅前端
  ja-JP: フロントエンドのみ

deploymentModeServer:
  en: Server Connected
  zh-CN: 有服务器
  ja-JP: サーバー接続あり

deploymentModeFrontendHint:
  en: This build runs entirely in the browser with IndexedDB storage. Server-side backup services are unavailable.
  zh-CN: 当前构建完全在浏览器内运行，并使用 IndexedDB 存储。服务端备份服务不可用。
  ja-JP: このビルドは IndexedDB を使うブラウザ単体モードです。サーバー側バックアップ機能は利用できません。

deploymentModeServerHint:
  en: This build is connected to the API server and can use authenticated server-side backup operations.
  zh-CN: 当前构建连接到 API 服务器，可以使用需要鉴权的服务端备份操作。
  ja-JP: このビルドは API サーバーに接続されており、認証付きのサーバー側バックアップ操作を利用できます。

languageLabel:
  en: Language
  zh-CN: 语言
  ja-JP: 言語

localBackupHint:
  en: These tools export or import browser-managed data directly on the current device.
  zh-CN: 这些工具直接在当前设备上导出或导入浏览器管理的数据。
  ja-JP: これらの機能は現在の端末上でブラウザ管理データを直接入出力します。

localImportUnavailableInServerMode:
  en: Backup import stays limited to frontend-only deployments because the current server-backed mode does not restore into remote storage from the browser.
  zh-CN: 备份导入仅适用于仅前端部署；当前服务端模式不会直接从浏览器恢复远程存储。
  ja-JP: バックアップのインポートはフロントエンド単体デプロイ時のみ利用できます。現在のサーバー接続モードでは、ブラウザからリモート保存領域へ直接復元しません。

serverBackupTitle:
  en: Server Backup Management
  zh-CN: 服务端备份管理
  ja-JP: サーバーバックアップ管理

serverBackupHint:
  en: Trigger server-generated backups, download them locally, and inspect which remote targets are currently configured.
  zh-CN: 在这里可以触发服务端生成备份、下载到本地，并查看当前哪些远程目标已经配置完成。
  ja-JP: ここではサーバー生成バックアップの実行、ローカルへのダウンロード、および現在利用可能なリモート保存先の確認ができます。

serverBackupUnavailable:
  en: Server backup management is unavailable in frontend-only deployments.
  zh-CN: 在仅前端部署中，服务端备份管理不可用。
  ja-JP: フロントエンド単体デプロイではサーバーバックアップ管理は利用できません。

